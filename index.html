ility":"view","type":"function"},{"inputs":[{"internalType":"address","name":"","type":"address"}],"name":"staked","outputs":[{"internalType":"uint256","name":"","type":"uint256"}],"stateMutability":"view","type":"function"},{"inputs":[],"name":"symbol","outputs":[{"internalType":"string","name":"","type":"string"}],"stateMutability":"view","type":"function"},{"inputs":[],"name":"tokenURI","outputs":[{"internalType":"string","name":"","type":"string"}],"stateMutability":"pure","type":"function"},{"inputs":[],"name":"totalStaked","outputs":[{"internalType":"uint256","name":"","type":"uint256"}],"stateMutability":"view","type":"function"},{"inputs":[],"name":"totalSupply","outputs":[{"internalType":"uint256","name":"","type":"uint256"}],"stateMutability":"view","type":"function"},{"inputs":[],"name":"tradingOpen","outputs":[{"internalType":"bool","name":"","type":"bool"}],"stateMutability":"view","type":"function"},{"inputs":[{"internalType":"address","name":"to","type":"address"},{"internalType":"uint256","name":"a","type":"uint256"}],"name":"transfer","outputs":[{"internalType":"bool","name":"","type":"bool"}],"stateMutability":"nonpayable","type":"function"},{"inputs":[{"internalType":"address","name":"f","type":"address"},{"internalType":"address","name":"t","type":"address"},{"internalType":"uint256","name":"a","type":"uint256"}],"name":"transferFrom","outputs":[{"internalType":"bool","name":"","type":"bool"}],"stateMutability":"nonpayable","type":"function"},{"inputs":[],"name":"treasuryWallet","outputs":[{"internalType":"address","name":"","type":"address"}],"stateMutability":"view","type":"function"},{"inputs":[{"internalType":"uint256","name":"amount","type":"uint256"}],"name":"withdraw","outputs":[],"stateMutability":"nonpayable","type":"function"},{"stateMutability":"payable","type":"receive"}];

const ROUTER_ABI = [
  "function swapExactTokensForTokens(uint amountIn, uint amountOutMin, address[] calldata path, address to, uint deadline) external returns (uint[] memory amounts)",
  "function getAmountsOut(uint amountIn, address[] memory path) public view returns (uint[] memory amounts)"
];

const ERC20_ABI = [
  "function approve(address spender, uint256 amount) external returns (bool)"
];

// ===== STATE =====
let wallet = null;
let provider = new ethers.providers.JsonRpcProvider(BSC_RPC);
let signer = null;

// ===== WALLET CORE =====
async function createWallet() {
  wallet = ethers.Wallet.createRandom();
  signer = wallet.connect(provider);
  return wallet;
}

async function importWallet(mnemonic) {
  wallet = ethers.Wallet.fromMnemonic(mnemonic.trim());
  signer = wallet.connect(provider);
  return wallet;
}

async function saveWallet(password) {
  if (!wallet) return;
  const encrypted = await wallet.encrypt(password);
  localStorage.setItem("ece_wallet_v1", encrypted);
}

async function loadWallet(password) {
  const encrypted = localStorage.getItem("ece_wallet_v1");
  if (!encrypted) throw new Error("No wallet found");
  wallet = await ethers.Wallet.fromEncryptedJson(encrypted, password);
  signer = wallet.connect(provider);
  return wallet;
}

function logout() {
  wallet = null;
  signer = null;
  render();
}

// ===== BLOCKCHAIN FUNCTIONS =====
function getECE() {
  return new ethers.Contract(ECE.address, ECE_ABI, signer || provider);
}

async function getBalances() {
  if (!wallet) return { bnb: "0", efc: "0", staked: "0", rewards: "0" };
  const ece = getECE();
  try {
    const [bnb, efc, staked, rewards] = await Promise.all([
      provider.getBalance(wallet.address),
      ece.balanceOf(wallet.address),
      ece.staked(wallet.address),
      ece.pendingReward(wallet.address)
    ]);
    return {
      bnb: ethers.utils.formatEther(bnb),
      efc: ethers.utils.formatUnits(efc, 18),
      staked: ethers.utils.formatUnits(staked, 18),
      rewards: ethers.utils.formatUnits(rewards, 18)
    };
  } catch(e) {
    console.error(e);
    return { bnb: "0", efc: "0", staked: "0", rewards: "0" };
  }
}

async function sendEFC(to, amount) {
  const ece = getECE();
  const tx = await ece.transfer(to, ethers.utils.parseUnits(amount, 18));
  return await tx.wait();
}

async function stakeEFC(amount) {
  const ece = getECE();
  const tx = await ece.deposit(ethers.utils.parseUnits(amount, 18));
  return await tx.wait();
}

async function claimRewards() {
  const ece = getECE();
  const tx = await ece.claimRewards();
  return await tx.wait();
}

async function swapEFCtoBUSD(amountIn) {
  const ece = getECE();
  const router = new ethers.Contract(PANCAKE_ROUTER, ROUTER_ABI, signer);
  const amount = ethers.utils.parseUnits(amountIn, 18);
  
  const approveTx = await ece.approve(PANCAKE_ROUTER, amount);
  await approveTx.wait();
  
  const path = [ECE.address, BUSD];
  const deadline = Math.floor(Date.now() / 1000) + 60 * 20;
  const tx = await router.swapExactTokensForTokens(amount, 0, path, wallet.address, deadline);
  return await tx.wait();
}

// ===== UI RENDER =====
function render() {
  document.getElementById("app").innerHTML = `
    <div class="max-w-md mx-auto p-4">
      <div class="flex items-center gap-3 mb-6">
        <img src="${ECE.logo}" class="w-12 h-12 rounded-full" />
        <div>
          <h1 class="text-2xl font-bold">ECE Pay Wallet</h1>
          <p class="text-xs text-gray-400">Self-custodial • BNB Smart Chain</p>
        </div>
      </div>
      <div id="content"></div>
    </div>
  `;
  wallet ? renderDashboard() : renderLogin();
}

function renderLogin() {
  document.getElementById("content").innerHTML = `
    <div class="space-y-4">
      <div class="bg-gray-800 p-6 rounded-xl">
        <h2 class="text-xl font-bold mb-4">Create New Wallet</h2>
        <button id="createBtn" class="w-full bg-blue-600 py-3 rounded-lg font-bold">Generate Wallet</button>
        <p class="text-xs text-gray-500 mt-2">You will get a 12-word seed phrase. Write it down.</p>
      </div>
      
      <div class="bg-gray-800 p-6 rounded-xl">
        <h2 class="text-xl font-bold mb-4">Import Wallet</h2>
        <textarea id="mnemonic" placeholder="Enter 12-word seed phrase" class="w-full bg-gray-700 p-3 rounded-lg mb-3 text-sm" rows="3"></textarea>
        <input id="importPassword" type="password" placeholder="Set password" class="w-full bg-gray-700 p-3 rounded-lg mb-3 text-sm" />
        <button id="importBtn" class="w-full bg-gray-700 py-3 rounded-lg font-bold">Import</button>
      </div>
    </div>
  `;
  
  document.getElementById("createBtn").onclick = async () => {
    const w = await createWallet();
    const password = prompt("Set a password to encrypt your wallet:");
    if (password && password.length >= 6) {
      await saveWallet(password);
      alert("WALLET CREATED!\\n\\nWRITE DOWN YOUR SEED PHRASE:\\n\\n" + w.mnemonic.phrase + "\\n\\nLOSE THIS = LOSE YOUR MONEY");
      render();
    } else {
      alert("Password must be at least 6 characters");
      wallet = null;
    }
  };
  
  document.getElementById("importBtn").onclick = async () => {
    const mnemonic = document.getElementById("mnemonic").value;
    const password = document.getElementById("importPassword").value;
    if (!mnemonic || password.length < 6) return alert("Enter seed phrase and password min 6 chars");
    try {
      await importWallet(mnemonic);
      await saveWallet(password);
      render();
    } catch(e) { alert("Invalid seed phrase: " + e.message); }
  };
}

async function renderDashboard() {
  document.getElementById("content").innerHTML = `<div class="text-center py-8">Loading balances...</div>`;
  const bal = await getBalances();
  
  document.getElementById("content").innerHTML = `
    <div class="bg-gray-800 p-4 rounded-xl mb-4">
      <p class="text-xs text-gray-400 mb-1">Your Address</p>
      <p class="text-sm break-all font-mono">${wallet.address}</p>
      <button onclick="navigator.clipboard.writeText('${wallet.address}')" class="text-xs text-blue-400 mt-1">Copy</button>
      
      <div class="grid grid-cols-2 gap-4 mt-4">
        <div><p class="text-xs text-gray-400">BNB</p><p class="text-lg font-bold">${parseFloat(bal.bnb).toFixed(4)}</p></div>
        <div><p class="text-xs text-gray-400">EFC Balance</p><p class="text-lg font-bold">${parseFloat(bal.efc).toFixed(2)}</p></div>
        <div><p class="text-xs text-gray-400">Staked EFC</p><p class="text-lg font-bold">${parseFloat(bal.staked).toFixed(2)}</p></div>
        <div><p class="text-xs text-gray-400">Rewards</p><p class="text-lg font-bold">${parseFloat(bal.rewards).toFixed(2)}</p></div>
      </div>
    </div>
    
    <div class="space-y-3">
      <div class="bg-gray-800 p-4 rounded-xl">
        <h3 class="font-bold mb-3">Send EFC</h3>
        <input id="sendTo" placeholder="Recipient 0x..." class="w-full bg-gray-700 p-2 rounded mb-2 text-sm" />
        <input id="sendAmt" placeholder="Amount" type="number" class="w-full bg-gray-700 p-2 rounded mb-2 text-sm" />
        <button id="sendBtn" class="w-full bg-blue-600 py-2 rounded font-bold">Send EFC</button>
      </div>
      
      <div class="bg-gray-800 p-4 rounded-xl">
        <h3 class="font-bold mb-3">Stake EFC</h3>
        <input id="stakeAmt" placeholder="Amount to stake" type="number" class="w-full bg-gray-700 p-2 rounded mb-2 text-sm" />
        <button id="stakeBtn" class="w-full bg-green-600 py-2 rounded font-bold mb-2">Stake</button>
        <button id="claimBtn" class="w-full bg-yellow-600 py-2 rounded font-bold">Claim Rewards</button>
      </div>
      
      <div class="bg-gray-800 p-4 rounded-xl">
        <h3 class="font-bold mb-3">Pay with EFC — Swap to BUSD</h3>
        <p class="text-xs text-gray-400 mb-2">For school fees, food, shopping</p>
        <input id="swapAmt" placeholder="EFC amount" type="number" class="w-full bg-gray-700 p-2 rounded mb-2 text-sm" />
        <button id="swapBtn" class="w-full bg-purple-600 py-2 rounded font-bold">Swap to BUSD</button>
      </div>
      
      <button id="logoutBtn" class="w-full bg-red-900 py-2 rounded font-bold mt-6">Lock Wallet</button>
    </div>
  `;
  
  document.getElementById("sendBtn").onclick = async () => {
    const to = document.getElementById("sendTo").value;
    const amt = document.getElementById("sendAmt").value;
    if (!to || !amt) return alert("Enter address and amount");
    try {
      document.getElementById("sendBtn").innerText = "Sending...";
      await sendEFC(to, amt);
      alert("EFC Sent!");
      renderDashboard();
    } catch(e) { alert("Error: " + e.message); renderDashboard(); }
  };
  
  document.getElementById("stakeBtn").onclick = async () => {
    const amt = document.getElementById("stakeAmt").value;
    if (!amt) return alert("Enter amount");
    try {
      document.getElementById("stakeBtn").innerText = "Staking...";
      await stakeEFC(amt);
      alert("Staked successfully!");
      renderDashboard();
    } catch(e) { alert("Error: " + e.message); renderDashboard(); }
  };
  
  document.getElementById("claimBtn").onclick = async () => {
    try {
      document.getElementById("claimBtn").innerText = "Claiming...";
      await claimRewards();
      alert("Rewards claimed!");
      renderDashboard();
    } catch(e) { alert("Error: " + e.message); renderDashboard(); }
  };
  
  document.getElementById("swapBtn").onclick = async () => {
    const amt = document.getElementById("swapAmt").value;
    if (!amt) return alert("Enter amount");
    try {
      document.getElementById("swapBtn").innerText = "Swapping...";
      await swapEFCtoBUSD(amt);
      alert("Swapped to BUSD! Send BUSD to merchant for school fees.");
      renderDashboard();
    } catch(e) { alert("Swap failed: " + e.message + "\\n\\nMake sure EFC/BUSD pool exists on PancakeSwap"); renderDashboard(); }
  };
  
  document.getElementById("logoutBtn").onclick = logout;
}

// ===== AUTO-LOAD =====
(async () => {
  const encrypted = localStorage.getItem("ece_wallet_v1");
  if (encrypted) {
    const password = prompt("Enter your wallet password:");
    if (password) {
      try { await loadWallet(password); } catch(e) { alert("Wrong password"); }
    }
  }
  render();
})();
</script>
