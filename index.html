ility":"view","type":"function"},{"inputs":[{"internalType":"address","name":"","type":"address"}],"name":"staked","outputs":[{"internalType":"uint256","name":"","type":"uint256"}],"stateMutability":"view","type":"function"},{"inputs":[],"name":"symbol","outputs":[{"internalType":"string","name":"","type":"string"}],"stateMutability":"view","type":"function"},{"inputs":[],"name":"tokenURI","outputs":[{"internalType":"string","name":"","type":"string"}],"stateMutability":"pure","type":"function"},{"inputs":[],"name":"totalStaked","outputs":[{"internalType":"uint256","name":"","type":"uint256"}],"stateMutability":"view","type":"function"},{"inputs":[],"name":"totalSupply","outputs":[{"internalType":"uint256","name":"","type":"uint256"}],"stateMutability":"view","type":"function"},{"inputs":[],"name":"tradingOpen","outputs":[{"internalType":"bool","name":"","type":"bool"}],"stateMutability":"view","type":"function"},{"inputs":[{"internalType":"address","name":"to","type":"address"},{"internalType":"uint256","name":"a","type":"uint256"}],"name":"transfer","outputs":[{"internalType":"bool","name":"","type":"bool"}],"stateMutability":"nonpayable","type":"function"},{"inputs":[{"internalType":"address","name":"f","type":"address"},{"internalType":"address","name":"t","type":"address"},{"internalType":"uint256","name":"a","type":"uint256"}],"name":"transferFrom","outputs":[{"internalType":"bool","name":"","type":"bool"}],"stateMutability":"nonpayable","type":"function"},{"inputs":[],"name":"treasuryWallet","outputs":[{"internalType":"address","name":"","type":"address"}],"stateMutability":"view","type":"function"},{"inputs":[{"internalType":"uint256","name":"amount","type":"uint256"}],"name":"withdraw","outputs":[],"stateMutability":"nonpayable","type":"function"},{"stateMutability":"payable","type":"receive"}];

const ROUTER_ABI = ["function swapExactTokensForTokens(uint amountIn,uint amountOutMin,address[] calldata path,address to,uint deadline) external returns (uint[] memory amounts)","function swapExactETHForTokens(uint amountOutMin,address[] calldata path,address to,uint deadline) external payable returns (uint[] memory amounts)","function swapExactTokensForETH(uint amountIn,uint amountOutMin,address[] calldata path,address to,uint deadline) external returns (uint[] memory amounts)","function getAmountsOut(uint amountIn,address[] memory path) public view returns (uint[] memory amounts)"];

// ===== STATE =====
const { ethers } = window.ethers;
let wallet = null;
let provider = new ethers.providers.JsonRpcProvider(CONFIG.RPC);
let signer = null;
let currentTab = 'wallet';
let balances = { bnb: 0, efc: 0, staked: 0, rewards: 0, busd: 0 };

// ===== CORE WALLET =====
async function createWallet() {
  wallet = ethers.Wallet.createRandom();
  signer = wallet.connect(provider);
  return wallet;
}

async function importWallet(mnemonic) {
  wallet = ethers.Wallet.fromMnemonic(mnemonic.trim());
  signer = wallet.connect(provider);
  return wallet;
}

async function saveWallet(password) {
  const encrypted = await wallet.encrypt(password);
  localStorage.setItem("ece_smart_wallet", encrypted);
}

async function loadWallet(password) {
  const encrypted = localStorage.getItem("ece_smart_wallet");
  if (!encrypted) throw new Error("No wallet");
  wallet = await ethers.Wallet.fromEncryptedJson(encrypted, password);
  signer = wallet.connect(provider);
}

function lockWallet() {
  wallet = null;
  signer = null;
  render();
}

// ===== BLOCKCHAIN =====
function getECE() { return new ethers.Contract(ECE.address, ECE_ABI, signer || provider); }
function getRouter() { return new ethers.Contract(CONFIG.PANCAKE_ROUTER, ROUTER_ABI, signer); }
function getToken(addr) { return new ethers.Contract(addr, ["function balanceOf(address) view returns (uint256)","function decimals() view returns (uint8)","function approve(address,uint256) returns (bool)"], signer); }

async function refreshBalances() {
  if (!wallet) return;
  try {
    const ece = getECE();
    const busd = getToken(CONFIG.BUSD);
    const [bnb, efc, staked, rewards, busdBal] = await Promise.all([
      provider.getBalance(wallet.address),
      ece.balanceOf(wallet.address),
      ece.staked(wallet.address),
      ece.pendingReward(wallet.address),
      busd.balanceOf(wallet.address)
    ]);
    balances = {
      bnb: parseFloat(ethers.utils.formatEther(bnb)),
      efc: parseFloat(ethers.utils.formatUnits(efc, 18)),
      staked: parseFloat(ethers.utils.formatUnits(staked, 18)),
      rewards: parseFloat(ethers.utils.formatUnits(rewards, 18)),
      busd: parseFloat(ethers.utils.formatUnits(busdBal, 18))
    };
  } catch(e) { console.error(e); }
}

async function sendToken(tokenAddr, to, amount, decimals=18) {
  if (tokenAddr === 'BNB') {
    const tx = await signer.sendTransaction({ to, value: ethers.utils.parseEther(amount) });
    return await tx.wait();
  }
  const token = getToken(tokenAddr);
  const tx = await token.transfer(to, ethers.utils.parseUnits(amount, decimals));
  return await tx.wait();
}

async function swapTokens(fromToken, toToken, amount) {
  const router = getRouter();
  const deadline = Math.floor(Date.now() / 1000) + 60 * 20;
  
  if (fromToken === 'BNB') {
    const path = [CONFIG.WBNB, toToken];
    const tx = await router.swapExactETHForTokens(0, path, wallet.address, deadline, { value: ethers.utils.parseEther(amount) });
    return await tx.wait();
  }
  
  const token = getToken(fromToken);
  await (await token.approve(CONFIG.PANCAKE_ROUTER, ethers.utils.parseUnits(amount, 18))).wait();
  
  if (toToken === 'BNB') {
    const path = [fromToken, CONFIG.WBNB];
    const tx = await router.swapExactTokensForETH(ethers.utils.parseUnits(amount, 18), 0, path, wallet.address, deadline);
    return await tx.wait();
  } else {
    const path = [fromToken, toToken];
    const tx = await router.swapExactTokensForTokens(ethers.utils.parseUnits(amount, 18), 0, path, wallet.address, deadline);
    return await tx.wait();
  }
}

function renderNavbar() {
  if (!wallet) return document.getElementById("navbar").innerHTML = '';

  currentTab = tab;

async function createNewWallet() {
  const w = await createWallet();
  const pass = prompt("Set a password to encrypt wallet (min 6 characters):");
  if (!pass || pass.length < 6) return alert("Password too short");
  await saveWallet(pass);
  alert("WALLET CREATED!\\n\\nWRITE DOWN YOUR SEED PHRASE:\\n\\n" + w.mnemonic.phrase + "\\n\\nYOU WILL LOSE ALL FUNDS IF YOU LOSE THIS");
  render();
}

async function importExistingWallet() {
  const seed = document.getElementById("seedInput").value;
  const pass = document.getElementById("passInput").value;
  if (!seed || pass.length < 6) return alert("Enter seed and password min 6 chars");
  try {
    await importWallet(seed);
    await saveWallet(pass);
    render();
  } catch(e) { alert("Invalid seed phrase"); }
}

async function renderTab() {
  await refreshBalances();
  const content = document.getElementById("content");
  if (currentTab === 'wallet') content.innerHTML = renderWalletTab();
  if (currentTab === 'swap') content.innerHTML = renderSwapTab();
  if (currentTab === 'earn') content.innerHTML = renderEarnTab();
  if (currentTab === 'browser') content.innerHTML = renderBrowserTab();
  if (currentTab === 'settings') content.innerHTML = renderSettingsTab();
  
  if (currentTab === 'wallet') QRCode.toCanvas(document.getElementById('qrcode'), wallet.address, { width: 180 });
}

// ===== ACTIONS =====
async function showSendModal() {
  const to = prompt("Recipient Address:");
  const amt = prompt("Amount EFC:");
  if (!to || !amt) return;
  try {
    await sendToken(ECE.address, to, amt);
    alert("EFC Sent Successfully!");
    renderTab();
  } catch(e) { alert("Send failed: " + e.message); }
}

function showReceiveModal() {

}

async function executeSwap() {
  const from = document.getElementById("fromToken").value;
  const to = document.getElementById("toToken").value;
  const amt = document.getElementById("fromAmt").value;
  if (!amt || from === to) return alert("Enter amount and select different tokens");
  try {
    await swapTokens(from, to, amt);
    alert("Swap Successful!");
    renderTab();
  } catch(e) { alert("Swap failed: " + e.message); }
}

async function stakeNow() {
  const amt = document.getElementById("stakeAmt").value;
  if (!amt) return;
  try {
    await (await getECE().deposit(ethers.utils.parseUnits(amt, 18))).wait();
    alert("Staked!");
    renderTab();
  } catch(e) { alert("Stake failed: " + e.message); }
}

async function claimNow() {
  try {
    await (await getECE().claimRewards()).wait();
    alert("Rewards Claimed!");
    renderTab();
  } catch(e) { alert("Claim failed: " + e.message); }
}

function showPayMerchant() {
  const merchant = prompt("Enter Merchant Wallet Address or BUSD Address:");
  const amt = prompt("Amount in EFC to pay:");
  if (!merchant || !amt) return;
  if (confirm(`Pay ${amt} EFC to merchant?\\n\\nThis will auto-swap EFC → BUSD and send.`)) {
    swapTokens(ECE.address, CONFIG.BUSD, amt).then(() => {
      sendToken(CONFIG.BUSD, merchant, "0").then(() => alert("Payment sent to merchant!"));
    }).catch(e => alert("Payment failed: " + e.message));
  }
}

function openDApp(url) {
  window.open(url, '_blank');
}

function exportKey() {
  if (confirm("WARNING: Never share your private key. Anyone with this can steal your funds. Continue?")) {
    prompt("Your Private Key:", wallet.privateKey);
  }
}

async function viewSeed() {
  const pass = prompt("Enter password to view seed phrase:");
  try {
    const w = await ethers.Wallet.fromEncryptedJson(localStorage.getItem("ece_smart_wallet"), pass);
    alert("SEED PHRASE:\\n\\n" + w.mnemonic.phrase + "\\n\\nWRITE THIS DOWN. NEVER SHARE.");
  } catch(e) { alert("Wrong password"); }
}

// ===== INIT =====
(async () => {
  const encrypted = localStorage.getItem("ece_smart_wallet");
  if (encrypted) {
    const pass = prompt("Welcome back! Enter password to unlock ECE Pay:");
    if (pass) {
      try { await loadWallet(pass); } catch(e) { localStorage.removeItem("ece_smart_wallet"); }
    }
  }
  render();
})();
</script>
